<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360" role="img" aria-labelledby="title desc">
  <title id="title">Featured systems: m0lz.02 and m0lz.03</title>
  <desc id="desc">Two project cards showing m0lz.02 as an AI coding workflow orchestrator and m0lz.03 as an MCP security proxy.</desc>
  <defs>
    <linearGradient id="header" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1100" height="360" rx="22" fill="#f8fafc"/>
  <rect x="28" y="28" width="1044" height="304" rx="20" fill="#ffffff" stroke="#dbe3ef"/>

  <g filter="url(#shadow)">
    <rect x="64" y="64" width="470" height="232" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
    <rect x="64" y="64" width="470" height="8" rx="4" fill="url(#header)"/>
    <circle cx="112" cy="116" r="28" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="112" y="124" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#2563eb">RS</text>
    <text x="156" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">m0lz.02</text>
    <text x="156" y="134" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#475569">AI coding workflow orchestrator</text>
    <text x="92" y="174" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">Plan -&gt; Implement -&gt; Contract-Evaluate</text>
    <text x="92" y="200" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">Dual-model adversarial review</text>
    <text x="92" y="226" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">Docker CI parity + release evidence</text>
    <g transform="translate(92 254)">
      <rect width="76" height="28" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="38" y="19" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#1d4ed8">Rust</text>
      <rect x="88" width="96" height="28" rx="14" fill="#ecfeff" stroke="#a5f3fc"/>
      <text x="136" y="19" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#0e7490">TypeScript</text>
      <rect x="196" width="82" height="28" rx="14" fill="#f0fdf4" stroke="#bbf7d0"/>
      <text x="237" y="19" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#15803d">Docker</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="566" y="64" width="470" height="232" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
    <rect x="566" y="64" width="470" height="8" rx="4" fill="url(#header)"/>
    <circle cx="614" cy="116" r="28" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="614" y="124" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f766e">TS</text>
    <text x="658" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">m0lz.03</text>
    <text x="658" y="134" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#475569">MCP security proxy daemon</text>
    <text x="594" y="174" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">OAuth 2.1 + API-key auth</text>
    <text x="594" y="200" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">PII detection + permission scoping</text>
    <text x="594" y="226" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">Queryable audit logs + Docker packaging</text>
    <g transform="translate(594 254)">
      <rect width="96" height="28" rx="14" fill="#ecfeff" stroke="#a5f3fc"/>
      <text x="48" y="19" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#0e7490">TypeScript</text>
      <rect x="108" width="72" height="28" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="144" y="19" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#334155">MCP</text>
      <rect x="192" width="86" height="28" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="235" y="19" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#c2410c">Security</text>
    </g>
  </g>
</svg>
