<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="440" viewBox="0 0 1100 440" role="img" aria-labelledby="title desc">
  <title id="title">Engineering proof matrix</title>
  <desc id="desc">Six compact proof tiles covering containers, secure AI runtime, evaluation systems, release gates, rollout controls, and observability.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1100" height="440" rx="28" fill="url(#panel)"/>
  <circle cx="964" cy="76" r="170" fill="#2563eb" opacity="0.16"/>
  <circle cx="120" cy="366" r="190" fill="#0f766e" opacity="0.14"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(60 54)">
      <rect width="320" height="142" rx="20" fill="#0f172a" stroke="#334155"/>
      <rect x="24" y="24" width="76" height="12" rx="6" fill="url(#blue)"/>
      <text x="24" y="68" font-size="22" font-weight="850" fill="#f8fafc">Containers</text>
      <text x="24" y="98" font-size="14" fill="#cbd5e1">Docker, Compose, GHCR</text>
      <text x="24" y="120" font-size="14" fill="#cbd5e1">CI parity and release smoke tests</text>
    </g>

    <g transform="translate(390 54)">
      <rect width="320" height="142" rx="20" fill="#0f172a" stroke="#334155"/>
      <rect x="24" y="24" width="96" height="12" rx="6" fill="url(#teal)"/>
      <text x="24" y="68" font-size="22" font-weight="850" fill="#f8fafc">Secure AI runtime</text>
      <text x="24" y="98" font-size="14" fill="#cbd5e1">Open-weight models, RunPod, AWS</text>
      <text x="24" y="120" font-size="14" fill="#cbd5e1">Private inference and PII controls</text>
    </g>

    <g transform="translate(720 54)">
      <rect width="320" height="142" rx="20" fill="#0f172a" stroke="#334155"/>
      <rect x="24" y="24" width="72" height="12" rx="6" fill="url(#steel)"/>
      <text x="24" y="68" font-size="22" font-weight="850" fill="#f8fafc">Evals</text>
      <text x="24" y="98" font-size="14" fill="#cbd5e1">Contracts, rubrics, regression tests</text>
      <text x="24" y="120" font-size="14" fill="#cbd5e1">Adversarial review workflows</text>
    </g>

    <g transform="translate(60 238)">
      <rect width="320" height="142" rx="20" fill="#0f172a" stroke="#334155"/>
      <rect x="24" y="24" width="88" height="12" rx="6" fill="url(#blue)"/>
      <text x="24" y="68" font-size="22" font-weight="850" fill="#f8fafc">Release gates</text>
      <text x="24" y="98" font-size="14" fill="#cbd5e1">GitHub Actions, Vercel, npm</text>
      <text x="24" y="120" font-size="14" fill="#cbd5e1">Rollback-aware launch evidence</text>
    </g>

    <g transform="translate(390 238)">
      <rect width="320" height="142" rx="20" fill="#0f172a" stroke="#334155"/>
      <rect x="24" y="24" width="78" height="12" rx="6" fill="url(#teal)"/>
      <text x="24" y="68" font-size="22" font-weight="850" fill="#f8fafc">Rollouts</text>
      <text x="24" y="98" font-size="14" fill="#cbd5e1">Feature flags and org-level toggles</text>
      <text x="24" y="120" font-size="14" fill="#cbd5e1">Canary checks and backout criteria</text>
    </g>

    <g transform="translate(720 238)">
      <rect width="320" height="142" rx="20" fill="#0f172a" stroke="#334155"/>
      <rect x="24" y="24" width="92" height="12" rx="6" fill="url(#steel)"/>
      <text x="24" y="68" font-size="22" font-weight="850" fill="#f8fafc">Observability</text>
      <text x="24" y="98" font-size="14" fill="#cbd5e1">Health checks, logs, telemetry</text>
      <text x="24" y="120" font-size="14" fill="#cbd5e1">Audit trails and runtime evidence</text>
    </g>
  </g>
</svg>
