<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" role="img" aria-labelledby="title desc">
  <title id="title">Engineering proof signals</title>
  <desc id="desc">Horizontal capability chart for containerized delivery, secure AI runtimes, evaluation systems, CI and release gates, feature flags, and observability.</desc>
  <defs>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="slate" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="430" rx="22" fill="#ffffff"/>
  <rect x="28" y="28" width="1044" height="374" rx="20" fill="#f8fafc" stroke="#dbe3ef"/>
  <text x="64" y="78" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" fill="#0f172a">Engineering proof signals</text>
  <text x="64" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#475569">What the current portfolio is designed to prove for contract, consulting, and engineering roles.</text>

  <g transform="translate(64 148)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(0 0)">
      <text x="0" y="20" font-size="15" font-weight="700" fill="#0f172a">Containerized delivery</text>
      <rect x="260" y="5" width="700" height="22" rx="11" fill="#e2e8f0"/>
      <rect x="260" y="5" width="660" height="22" rx="11" fill="url(#blue)"/>
      <text x="930" y="21" font-size="12" font-weight="700" fill="#334155">Docker, CI parity, GHCR</text>
    </g>
    <g transform="translate(0 48)">
      <text x="0" y="20" font-size="15" font-weight="700" fill="#0f172a">Secure AI runtimes</text>
      <rect x="260" y="5" width="700" height="22" rx="11" fill="#e2e8f0"/>
      <rect x="260" y="5" width="620" height="22" rx="11" fill="url(#teal)"/>
      <text x="890" y="21" font-size="12" font-weight="700" fill="#334155">RunPod, AWS, open-weight</text>
    </g>
    <g transform="translate(0 96)">
      <text x="0" y="20" font-size="15" font-weight="700" fill="#0f172a">Eval + review systems</text>
      <rect x="260" y="5" width="700" height="22" rx="11" fill="#e2e8f0"/>
      <rect x="260" y="5" width="640" height="22" rx="11" fill="url(#slate)"/>
      <text x="910" y="21" font-size="12" font-weight="700" fill="#334155">Contracts, rubrics, tests</text>
    </g>
    <g transform="translate(0 144)">
      <text x="0" y="20" font-size="15" font-weight="700" fill="#0f172a">CI/CD + release gates</text>
      <rect x="260" y="5" width="700" height="22" rx="11" fill="#e2e8f0"/>
      <rect x="260" y="5" width="610" height="22" rx="11" fill="url(#blue)"/>
      <text x="880" y="21" font-size="12" font-weight="700" fill="#334155">Actions, Vercel, npm</text>
    </g>
    <g transform="translate(0 192)">
      <text x="0" y="20" font-size="15" font-weight="700" fill="#0f172a">Feature flags + rollouts</text>
      <rect x="260" y="5" width="700" height="22" rx="11" fill="#e2e8f0"/>
      <rect x="260" y="5" width="570" height="22" rx="11" fill="url(#teal)"/>
      <text x="840" y="21" font-size="12" font-weight="700" fill="#334155">Org toggles, backout plans</text>
    </g>
    <g transform="translate(0 240)">
      <text x="0" y="20" font-size="15" font-weight="700" fill="#0f172a">Observability + audit trails</text>
      <rect x="260" y="5" width="700" height="22" rx="11" fill="#e2e8f0"/>
      <rect x="260" y="5" width="590" height="22" rx="11" fill="url(#slate)"/>
      <text x="860" y="21" font-size="12" font-weight="700" fill="#334155">Health, logs, evidence</text>
    </g>
  </g>

  <text x="64" y="386" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">Capability chart, not a ranking. Bars reflect visible portfolio coverage and production examples described in this README.</text>
</svg>
