<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="756" viewBox="0 0 1100 756" role="img" aria-labelledby="title desc">
  <title id="title">Open source work tracker</title>
  <desc id="desc">Tracker-style snapshot verified July 15, 2026, with four active review items and ten recently merged pull requests.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
