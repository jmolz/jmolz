<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="600" viewBox="0 0 1100 600" role="img" aria-labelledby="title desc">
  <title id="title">Open source work tracker</title>
  <desc id="desc">Tracker-style snapshot with six active review items and three recently merged workstreams.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="45%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1100" height="600" rx="28" fill="url(#panel)"/>
  <circle cx="964" cy="92" r="170" fill="#2563eb" opacity="0.16"/>
  <circle cx="130" cy="432" r="190" fill="#0f766e" opacity="0.14"/>
  <rect x="58" y="54" width="984" height="6" rx="3" fill="url(#accent)"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
