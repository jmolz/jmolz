<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="570" viewBox="0 0 1100 570" role="img" aria-labelledby="title desc">
  <title id="title">Open source work tracker</title>
  <desc id="desc">Tracker-style snapshot with four active review items and three recently merged workstreams.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="45%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1100" height="570" rx="28" fill="url(#panel)"/>
  <circle cx="964" cy="92" r="170" fill="#2563eb" opacity="0.16"/>
  <circle cx="130" cy="432" r="190" fill="#0f766e" opacity="0.14"/>
  <rect x="58" y="54" width="984" height="6" rx="3" fill="url(#accent)"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="58" y="104" font-size="30" font-weight="850" fill="#f8fafc">Open source tracker</text>
    <text x="58" y="132" font-size="15" fill="#cbd5e1">Current review queue and recently merged patches across developer-tool, AI infrastructure, and Rust/Python projects.</text>

    <g transform="translate(58 168)" filter="url(#shadow)">
      <rect width="484" height="360" rx="22" fill="#0f172a" stroke="#334155"/>
      <text x="26" y="42" font-size="18" font-weight="850" fill="#f8fafc">Active review queue</text>
      <rect x="330" y="24" width="126" height="28" rx="14" fill="#1e3a8a"/>
      <text x="393" y="43" text-anchor="middle" font-size="12" font-weight="850" fill="#bfdbfe">4 open PRs</text>

      <g transform="translate(26 66)">
        <rect width="432" height="64" rx="16" fill="#111827" stroke="#334155"/>
        <text x="18" y="30" font-size="15" font-weight="850" fill="#f8fafc">Puppeteer #15075</text>
        <rect x="300" y="16" width="112" height="24" rx="12" fill="#312e81"/>
        <text x="356" y="33" text-anchor="middle" font-size="11" font-weight="850" fill="#c4b5fd">in review</text>
        <text x="18" y="54" font-size="13" fill="#cbd5e1">Locale emulation across CDP and BiDi</text>
      </g>

      <g transform="translate(26 138)">
        <rect width="432" height="64" rx="16" fill="#111827" stroke="#334155"/>
        <text x="18" y="30" font-size="15" font-weight="850" fill="#f8fafc">AWS IAM Policy Autopilot #217</text>
        <rect x="300" y="16" width="112" height="24" rx="12" fill="#312e81"/>
        <text x="356" y="33" text-anchor="middle" font-size="11" font-weight="850" fill="#c4b5fd">in review</text>
        <text x="18" y="54" font-size="13" fill="#cbd5e1">Done from my side; awaiting maintainer review</text>
      </g>

      <g transform="translate(26 210)">
        <rect width="432" height="64" rx="16" fill="#111827" stroke="#334155"/>
        <text x="18" y="30" font-size="15" font-weight="850" fill="#f8fafc">AWS IAM Policy Autopilot #227</text>
        <rect x="300" y="16" width="112" height="24" rx="12" fill="#312e81"/>
        <text x="356" y="33" text-anchor="middle" font-size="11" font-weight="850" fill="#c4b5fd">in review</text>
        <text x="18" y="54" font-size="13" fill="#cbd5e1">Read-only MCP guardrail for IAM mutation</text>
      </g>

      <g transform="translate(26 282)">
        <rect width="432" height="64" rx="16" fill="#111827" stroke="#334155"/>
        <text x="18" y="30" font-size="15" font-weight="850" fill="#f8fafc">Deno / dprint TypeScript plugin #800</text>
        <rect x="300" y="16" width="112" height="24" rx="12" fill="#312e81"/>
        <text x="356" y="33" text-anchor="middle" font-size="11" font-weight="850" fill="#c4b5fd">in review</text>
        <text x="18" y="54" font-size="13" fill="#cbd5e1">JSDoc Markdown hard-break preservation</text>
      </g>
    </g>

    <g transform="translate(570 168)" filter="url(#shadow)">
      <rect width="472" height="360" rx="22" fill="#0f172a" stroke="#334155"/>
      <text x="26" y="42" font-size="18" font-weight="850" fill="#f8fafc">Merged patch train</text>
      <rect x="328" y="24" width="118" height="28" rx="14" fill="#064e3b"/>
      <text x="387" y="43" text-anchor="middle" font-size="12" font-weight="850" fill="#a7f3d0">6 merged PRs</text>

      <g transform="translate(26 76)">
        <rect width="420" height="58" rx="16" fill="#111827" stroke="#334155"/>
        <text x="18" y="25" font-size="15" font-weight="850" fill="#f8fafc">TrustGraph #948 #952 #954 #955</text>
        <text x="18" y="45" font-size="13" fill="#cbd5e1">Safer exception handling, parsing, and WebSocket behavior</text>
      </g>

      <g transform="translate(26 150)">
        <rect width="420" height="58" rx="16" fill="#111827" stroke="#334155"/>
        <text x="18" y="25" font-size="15" font-weight="850" fill="#f8fafc">AWS IAM Policy Autopilot #214</text>
        <text x="18" y="45" font-size="13" fill="#cbd5e1">Pre-commit hooks and local validation docs</text>
      </g>

      <g transform="translate(26 224)">
        <rect width="420" height="58" rx="16" fill="#111827" stroke="#334155"/>
        <text x="18" y="27" font-size="15" font-weight="850" fill="#f8fafc">Harper #3460</text>
        <text x="18" y="47" font-size="13" fill="#cbd5e1">Rust grammar false-positive fix</text>
      </g>
