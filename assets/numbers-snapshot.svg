<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="260" viewBox="0 0 1100 260" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio numbers snapshot</title>
  <desc id="desc">Four portfolio metrics: 7100 GitHub contributions in the last 12 months, 15 products shipped, 4 companies co-founded, and 2900 Alpaka commits.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1100" height="260" rx="28" fill="url(#panel)"/>
  <rect x="60" y="48" width="980" height="6" rx="3" fill="url(#accent)"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(60 82)">
      <rect width="224" height="128" rx="20" fill="#0f172a" stroke="#334155"/>
      <text x="24" y="58" font-size="36" font-weight="900" fill="#60a5fa">7,100+</text>
      <text x="24" y="88" font-size="14" font-weight="800" fill="#f8fafc">GitHub contributions</text>
      <text x="24" y="111" font-size="13" fill="#94a3b8">last 12 months</text>
    </g>

    <g transform="translate(312 82)">
      <rect width="224" height="128" rx="20" fill="#0f172a" stroke="#334155"/>
      <text x="24" y="58" font-size="36" font-weight="900" fill="#5eead4">15+</text>
      <text x="24" y="88" font-size="14" font-weight="800" fill="#f8fafc">Products shipped</text>
      <text x="24" y="111" font-size="13" fill="#94a3b8">zero to production</text>
    </g>

    <g transform="translate(564 82)">
      <rect width="224" height="128" rx="20" fill="#0f172a" stroke="#334155"/>
      <text x="24" y="62" font-size="46" font-weight="900" fill="#93c5fd">4</text>
      <text x="24" y="91" font-size="14" font-weight="800" fill="#f8fafc">Companies co-founded</text>
      <text x="24" y="114" font-size="13" fill="#94a3b8">technical leadership</text>
    </g>

    <g transform="translate(816 82)">
      <rect width="224" height="128" rx="20" fill="#0f172a" stroke="#334155"/>
      <text x="24" y="58" font-size="36" font-weight="900" fill="#2dd4bf">2,900+</text>
      <text x="24" y="88" font-size="14" font-weight="800" fill="#f8fafc">Alpaka commits</text>
      <text x="24" y="111" font-size="13" fill="#94a3b8">deep product velocity</text>
    </g>
  </g>
</svg>
